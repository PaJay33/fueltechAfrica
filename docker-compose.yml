version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fueltech_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fueltech
      POSTGRES_PASSWORD: fueltech_dev_password
      POSTGRES_DB: fueltech_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fueltech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fueltech -d fueltech_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fueltech_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass fueltech_redis_password --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fueltech_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: PgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fueltech_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fueltech.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - fueltech_network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  fueltech_network:
    driver: bridge
